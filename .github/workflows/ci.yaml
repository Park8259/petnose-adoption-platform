name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      # The repository does not commit a Gradle wrapper jar, so CI uses the
      # Gradle CLI distribution. v6 is current; cache-provider: basic avoids
      # the enhanced/proprietary caching path while keeping stable dependency cache behavior.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"
          cache-provider: basic

      - name: Run Gradle tests
        run: gradle test --no-daemon --stacktrace

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: python-embed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-embed/requirements.txt

      - name: Install mock/dev test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run pytest
        run: pytest -q

  optional-onnx-runtime-smoke:
    name: Optional ONNX runtime smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    env:
      ONNX_IMAGE: petnose-python-embed-onnx:ci
      ONNX_CONTAINER: petnose-python-embed-onnx-ci
      ONNX_PORT: "18080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            python-embed/requirements.txt
            python-embed/requirements-onnx.txt

      - name: Install optional ONNX test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python-embed/requirements.txt
          pip install -r python-embed/requirements-onnx.txt
          pip install pytest

      - name: Run optional ONNX adapter tests
        env:
          PETNOSE_REQUIRE_ONNX_TESTS: "1"
        run: pytest -q python-embed/tests/test_embedder_factory.py python-embed/tests/test_dog_nose_onnx_embedder.py

      - name: Build optional ONNX Python embed image
        run: |
          docker build \
            --build-arg INSTALL_REAL_MODEL_DEPS=0 \
            --build-arg INSTALL_ONNX_RUNTIME_DEPS=1 \
            -t "${ONNX_IMAGE}" \
            ./python-embed

      - name: Check optional ONNX imports in image
        run: |
          docker run --rm "${ONNX_IMAGE}" \
            python -c "import numpy, PIL, onnx, onnxruntime; print(onnxruntime.__version__)"

      - name: Generate synthetic ONNX smoke inputs
        run: |
          set -euo pipefail
          SMOKE_DIR="${RUNNER_TEMP}/petnose-onnx-smoke"
          mkdir -p "${SMOKE_DIR}/images"
          python python-embed/tests/synthetic_onnx_model.py \
            --output "${SMOKE_DIR}/smoke.onnx" \
            --images-dir "${SMOKE_DIR}/images" \
            --count 5
          test -f "${SMOKE_DIR}/smoke.onnx"
          test "$(find "${SMOKE_DIR}/images" -name '*.png' | wc -l)" -eq 5

      - name: Run synthetic ONNX Docker API smoke
        run: |
          set -euo pipefail
          SMOKE_DIR="${RUNNER_TEMP}/petnose-onnx-smoke"

          on_error() {
            echo "[ERROR] Optional ONNX Docker API smoke failed."
            docker logs --tail=120 "${ONNX_CONTAINER}" || true
          }
          trap on_error ERR

          docker rm -f "${ONNX_CONTAINER}" >/dev/null 2>&1 || true
          docker run -d \
            --name "${ONNX_CONTAINER}" \
            -p "${ONNX_PORT}:8000" \
            -v "${SMOKE_DIR}:/models:ro" \
            -e EMBED_MODEL=dog-nose-identification2 \
            -e EMBED_VECTOR_DIM=2048 \
            -e DOG_NOSE_RUNTIME=onnxruntime \
            -e DOG_NOSE_ONNX_PATH=/models/smoke.onnx \
            -e DOG_NOSE_MODEL_DIR=/models \
            "${ONNX_IMAGE}"

          for attempt in $(seq 1 40); do
            if curl -fsS --max-time 5 "http://localhost:${ONNX_PORT}/health" > "${RUNNER_TEMP}/onnx-health.json"; then
              break
            fi
            if [ "${attempt}" -eq 40 ]; then
              echo "[ERROR] ONNX Python embed health did not become ready."
              exit 1
            fi
            sleep 2
          done

          python - <<'PY'
          import json
          import os
          with open(os.path.join(os.environ["RUNNER_TEMP"], "onnx-health.json"), encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          assert body["model_loaded"] is True, body
          assert body["backend"] == "onnxruntime-cpu", body
          assert body["device"] == "cpu", body
          assert body["vector_dim"] == 2048, body
          assert body["image_size"] == 224, body
          PY

          curl -fsS -X POST "http://localhost:${ONNX_PORT}/embed" \
            -F "image=@${SMOKE_DIR}/images/nose-1.png;type=image/png" \
            > "${RUNNER_TEMP}/onnx-embed.json"
          python - <<'PY'
          import json
          import math
          import os
          with open(os.path.join(os.environ["RUNNER_TEMP"], "onnx-embed.json"), encoding="utf-8") as handle:
              body = json.load(handle)
          vector = body["vector"]
          norm = math.sqrt(sum(value * value for value in vector))
          summary = {"status": body.get("status"), "dimension": body.get("dimension"), "vector_length": len(vector)}
          assert body["status"] == "ok", summary
          assert body["dimension"] == 2048, summary
          assert len(vector) == 2048, summary
          assert all(math.isfinite(value) for value in vector), summary
          assert abs(norm - 1.0) < 1e-5, {**summary, "norm": norm}
          PY

          curl -fsS -X POST "http://localhost:${ONNX_PORT}/embed-batch" \
            -F "images=@${SMOKE_DIR}/images/nose-1.png;type=image/png" \
            -F "images=@${SMOKE_DIR}/images/nose-2.png;type=image/png" \
            -F "images=@${SMOKE_DIR}/images/nose-3.png;type=image/png" \
            -F "images=@${SMOKE_DIR}/images/nose-4.png;type=image/png" \
            -F "images=@${SMOKE_DIR}/images/nose-5.png;type=image/png" \
            > "${RUNNER_TEMP}/onnx-embed-batch.json"
          python - <<'PY'
          import json
          import math
          import os
          with open(os.path.join(os.environ["RUNNER_TEMP"], "onnx-embed-batch.json"), encoding="utf-8") as handle:
              body = json.load(handle)
          summary = {
              "status": body.get("status"),
              "dimension": body.get("dimension"),
              "count": body.get("count"),
              "item_count": len(body.get("items", [])),
          }
          assert body["status"] == "ok", summary
          assert body["dimension"] == 2048, summary
          assert body["count"] == 5, summary
          assert len(body["items"]) == 5, summary
          for item in body["items"]:
              vector = item["vector"]
              norm = math.sqrt(sum(value * value for value in vector))
              item_summary = {**summary, "index": item.get("index"), "vector_length": len(vector)}
              assert len(vector) == 2048, item_summary
              assert all(math.isfinite(value) for value in vector), item_summary
              assert abs(norm - 1.0) < 1e-5, {**item_summary, "norm": norm}
          PY

      - name: Collect optional ONNX container logs on failure
        if: failure()
        run: docker logs --tail=120 "${ONNX_CONTAINER}" || true

      - name: Cleanup optional ONNX smoke
        if: always()
        run: |
          docker rm -f "${ONNX_CONTAINER}" >/dev/null 2>&1 || true
          rm -rf "${RUNNER_TEMP}/petnose-onnx-smoke"

  docs-script-check:
    name: Docs and script sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check whitespace
        run: git diff --check

      - name: Validate evidence JSON
        run: |
          set -euo pipefail
          python -m json.tool docs/model-analysis/experiment_summary.json > /dev/null
          python -m json.tool docs/ops-evidence/submission-real-model-e2e-summary.json > /dev/null

      - name: Verify PowerShell availability
        run: pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'

      - name: Check production inference release guardrails
        run: |
          set -euo pipefail
          pwsh -NoProfile -File ./scripts/verify-server-release-readiness.ps1 -Help
          pwsh -NoProfile -File ./scripts/tests/verify-server-release-policy.ps1
          bash -n infra/scripts/deploy-real-model.sh
          bash infra/scripts/tests/test-production-runtime-policy.sh

      - name: Check reconciliation script help and syntax
        run: |
          set -euo pipefail
          pwsh -NoProfile -File ./scripts/check-qdrant-reference-consistency.ps1 -Help
          pwsh -NoProfile -Command "& { [scriptblock]::Create((Get-Content -Raw './scripts/check-qdrant-reference-consistency.ps1')) | Out-Null }"

      - name: Check submission E2E script help and syntax
        run: |
          set -euo pipefail
          pwsh -NoProfile -File ./scripts/verify-submission-real-model-e2e.ps1 -Help
          pwsh -NoProfile -Command "& { [scriptblock]::Create((Get-Content -Raw './scripts/verify-submission-real-model-e2e.ps1')) | Out-Null }"

      - name: Check final regression runner
        run: |
          set -euo pipefail
          pwsh -NoProfile -File ./scripts/run-model-pipeline-final-regression.ps1 -Help
          pwsh -NoProfile -File ./scripts/run-model-pipeline-final-regression.ps1 -Mode PlanOnly
          pwsh -NoProfile -File ./scripts/tests/test-model-pipeline-final-regression.ps1

      - name: Secret scan-lite for committed evidence
        run: |
          set -euo pipefail
          if grep -R -n -E -- '-----BEGIN [A-Z ]*PRIVATE KEY-----|eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{40,}|AKIA[0-9A-Z]{16}' docs/ops-evidence docs/model-analysis scripts; then
            echo "::error::Potential raw private key, JWT, API key, GitHub token, OpenAI key, or AWS key pattern found."
            exit 1
          fi

  compose-mock-smoke:
    name: Compose mock smoke
    runs-on: ubuntu-latest
    needs: [backend-test, python-test, docs-script-check]
    permissions:
      contents: read
    timeout-minutes: 25
    env:
      COMPOSE_ENV_FILE: infra/docker/.env
      QDRANT_COLLECTION: dog_nose_embeddings_ci_mock
      QDRANT_VECTOR_DIM: "128"
      EMBED_MODEL: mock-v1
      PYTHON_EMBED_INSTALL_REAL_DEPS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose env
        run: cp infra/docker/.env.example "${COMPOSE_ENV_FILE}"

      - name: Validate compose config
        run: |
          set -euo pipefail
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            config > /tmp/petnose-compose-config.yaml
          grep -q "dog_nose_embeddings_ci_mock" /tmp/petnose-compose-config.yaml

      - name: Start compose mock stack
        run: |
          set -euo pipefail
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            up -d --build

      - name: Run mock smoke checks
        run: |
          set -euo pipefail

          compose_dev() {
            docker compose \
              --env-file "${COMPOSE_ENV_FILE}" \
              -f infra/docker/compose.yaml \
              -f infra/docker/compose.dev.yaml \
              "$@"
          }

          on_error() {
            echo "[ERROR] Compose mock smoke failed. Container status and logs follow."
            compose_dev ps || true
            compose_dev logs --tail=200 spring-api python-embed mysql qdrant nginx || true
          }
          trap on_error ERR

          echo "[INFO] Waiting for actuator health through nginx..."
          for attempt in $(seq 1 50); do
            if curl -fsS --max-time 5 http://localhost/actuator/health > /tmp/actuator.json; then
              break
            fi
            if [ "${attempt}" -eq 50 ]; then
              echo "[ERROR] actuator health did not become ready."
              exit 1
            fi
            sleep 3
          done

          python - <<'PY'
          import json
          with open("/tmp/actuator.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "UP", body
          PY

          echo "[INFO] Checking Python embed health and mock dimension..."
          curl -fsS http://localhost:8000/health > /tmp/python-health.json
          python - <<'PY'
          import json
          import os
          expected_dim = int(os.environ["QDRANT_VECTOR_DIM"])
          with open("/tmp/python-health.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          assert body["model_loaded"] is True, body
          assert body["model"].startswith("mock-v1"), body
          assert body["vector_dim"] == expected_dim, body
          PY

          echo "[INFO] Checking Spring dev endpoints..."
          curl -fsS http://localhost:8080/api/dev/ping > /tmp/dev-ping.json
          python - <<'PY'
          import json
          with open("/tmp/dev-ping.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          PY

          curl -fsS http://localhost:8080/api/dev/embed-ping > /tmp/embed-ping.json
          python - <<'PY'
          import json
          with open("/tmp/embed-ping.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["embed_service_healthy"] is True, body
          PY

          echo "[INFO] Checking Spring -> Python /embed call and vector dimension..."
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO7+2d8AAAAASUVORK5CYII=" | base64 -d > /tmp/smoke.png
          curl -fsS -X POST "http://localhost:8080/api/dev/embed-sample" \
            -F "image=@/tmp/smoke.png;type=image/png" > /tmp/embed-sample.json
          python - <<'PY'
          import json
          import os
          expected_dim = int(os.environ["QDRANT_VECTOR_DIM"])
          with open("/tmp/embed-sample.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          assert body["dimension"] == expected_dim, body
          assert body["vector_length"] == expected_dim, body
          PY

          echo "[INFO] Checking Flyway and active dog nose v2 tables..."
          MYSQL_USER_VALUE="$(grep -m1 '^MYSQL_USER=' "${COMPOSE_ENV_FILE}" | cut -d= -f2- | tr -d '\r')"
          MYSQL_PASSWORD_VALUE="$(grep -m1 '^MYSQL_PASSWORD=' "${COMPOSE_ENV_FILE}" | cut -d= -f2- | tr -d '\r')"
          MYSQL_DATABASE_VALUE="$(grep -m1 '^MYSQL_DATABASE=' "${COMPOSE_ENV_FILE}" | cut -d= -f2- | tr -d '\r')"
          FLYWAY_COUNT="$(compose_dev exec -T mysql mysql -u"${MYSQL_USER_VALUE}" -p"${MYSQL_PASSWORD_VALUE}" -D"${MYSQL_DATABASE_VALUE}" -Nse "SELECT COUNT(*) FROM flyway_schema_history WHERE success=1")"
          test "${FLYWAY_COUNT:-0}" -ge 1

          for table in users dogs dog_images dog_nose_references verification_logs adoption_posts adoption_post_likes password_reset_tokens; do
            TABLE_COUNT="$(compose_dev exec -T mysql mysql -u"${MYSQL_USER_VALUE}" -p"${MYSQL_PASSWORD_VALUE}" -D"${MYSQL_DATABASE_VALUE}" -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${MYSQL_DATABASE_VALUE}' AND table_name='${table}'")"
            test "${TABLE_COUNT}" -eq 1
          done

          echo "[INFO] Checking Qdrant mock collection contract..."
          curl -fsS "http://localhost:6333/collections/${QDRANT_COLLECTION}" > /tmp/qdrant-collection.json
          python - <<'PY'
          import json
          import os
          expected_dim = int(os.environ["QDRANT_VECTOR_DIM"])
          with open("/tmp/qdrant-collection.json", encoding="utf-8") as handle:
              body = json.load(handle)
          assert body["status"] == "ok", body
          vectors = body["result"]["config"]["params"]["vectors"]
          if "size" in vectors:
              size = vectors["size"]
              distance = vectors["distance"]
          else:
              first_vector = next(iter(vectors.values()))
              size = first_vector["size"]
              distance = first_vector["distance"]
          assert size == expected_dim, body
          assert distance.lower() == "cosine", body
          PY

      - name: Collect compose logs on failure
        if: failure()
        run: |
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            ps || true
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            logs --tail=200 spring-api python-embed mysql qdrant nginx || true

      - name: Cleanup compose
        if: always()
        run: |
          docker compose \
            --env-file "${COMPOSE_ENV_FILE}" \
            -f infra/docker/compose.yaml \
            -f infra/docker/compose.dev.yaml \
            down -v || true

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-test, python-test]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t petnose-spring-api:ci ./backend

      - name: Build python embed mock image
        run: docker build --build-arg INSTALL_REAL_MODEL_DEPS=0 --build-arg INSTALL_ONNX_RUNTIME_DEPS=0 -t petnose-python-embed:ci ./python-embed
